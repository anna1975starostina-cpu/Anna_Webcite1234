<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Anna Starostina</title>
    <meta
      id="page-description"
      name="description"
      content="Anna Starostina: operations, wellness, recovery, hospitality concept development and leadership."
    />
    <meta name="theme-color" content="#f3eee7" />
    <meta id="og-title" property="og:title" content="Anna Starostina" />
    <meta
      id="og-description"
      property="og:description"
      content="Personal profile in wellness, recovery and hospitality leadership."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-glow ambient-glow-left"></div>
    <div class="ambient-glow ambient-glow-right"></div>

    <div class="page-shell">
      <header class="site-nav">
        <a class="brand" href="#top" aria-label="Anna Starostina home">
          <span class="brand-mark">AS</span>
          <span class="brand-text">Anna Starostina</span>
        </a>

        <div class="nav-controls">
          <nav class="primary-nav" aria-label="Primary navigation">
            <a id="nav-expertise" href="#expertise">Expertise</a>
            <a id="nav-career" href="#career">Career</a>
            <a id="nav-contact" href="#contact">Contact</a>
          </nav>

          <div class="lang-switcher" aria-label="Language switcher">
            <button class="lang-button" id="lang-en" type="button">EN</button>
            <button class="lang-button" id="lang-ru" type="button">RU</button>
          </div>
        </div>
      </header>

      <main id="top">
        <section class="hero reveal" aria-labelledby="headline">
          <div class="hero-copy">
            <p class="hero-location" id="hero-location"></p>
            <h1 id="headline"></h1>
            <p class="hero-summary" id="summary"></p>

            <div class="hero-actions" aria-label="Profile actions">
              <a class="button button-primary" id="primary-cta" href="#contact"></a>
              <a class="button button-secondary" id="secondary-cta" href="#career"></a>
            </div>

            <dl class="snapshot-grid" id="snapshot-grid" aria-label="Professional snapshot"></dl>
          </div>

          <div class="hero-visual">
            <div class="portrait-frame" id="portrait-frame">
              <img class="portrait-image" id="portrait-image" alt="" />
              <div class="portrait-monogram" id="portrait-monogram">AS</div>
            </div>

            <div class="accent-card">
              <p class="accent-card-label" id="visual-kicker"></p>
              <p class="accent-card-title" id="visual-name"></p>
              <p class="accent-card-copy" id="visual-caption"></p>
            </div>
          </div>
        </section>

        <section class="profile-section reveal" aria-labelledby="profile-title">
          <div class="section-header">
            <p class="section-label" id="profile-label"></p>
            <div class="section-copy">
              <h2 id="profile-title"></h2>
              <p id="profile-intro"></p>
            </div>
          </div>
        </section>

        <section class="expertise-section reveal" id="expertise" aria-labelledby="expertise-title">
          <div class="section-header">
            <div>
              <p class="section-label" id="expertise-label"></p>
              <h2 id="expertise-title"></h2>
            </div>
          </div>
          <div class="expertise-grid" id="expertise-grid"></div>
        </section>

        <section class="quote-section reveal" aria-labelledby="quote-title">
          <blockquote class="quote-card">
            <p class="section-label" id="quote-label"></p>
            <p class="quote-text" id="quote-text"></p>
          </blockquote>
        </section>

        <section class="career-section reveal" id="career" aria-labelledby="career-title">
          <div class="section-header">
            <div>
              <p class="section-label" id="career-label"></p>
              <h2 id="career-title"></h2>
            </div>
          </div>
          <ol class="timeline" id="career-list"></ol>
        </section>

        <section class="education-section reveal" aria-labelledby="education-title">
          <div class="section-header">
            <div>
              <p class="section-label" id="education-label"></p>
              <h2 id="education-title"></h2>
            </div>
            <p class="section-side-copy" id="education-copy"></p>
          </div>
        </section>

        <section class="contact-section reveal" id="contact" aria-labelledby="contact-title">
          <div class="section-header">
            <div>
              <p class="section-label" id="contact-label"></p>
              <h2 id="contact-title"></h2>
            </div>
          </div>

          <div class="contact-layout">
            <form class="contact-form" id="contact-form">
              <label class="field">
                <span id="form-name-label"></span>
                <input id="form-name" name="name" type="text" />
              </label>

              <label class="field">
                <span id="form-email-label"></span>
                <input id="form-email" name="email" type="email" />
              </label>

              <label class="field">
                <span id="form-subject-label"></span>
                <input id="form-subject" name="subject" type="text" />
              </label>

              <label class="field field-message">
                <span id="form-message-label"></span>
                <textarea id="form-message" name="message" rows="6"></textarea>
              </label>

              <div class="form-actions">
                <button class="button button-primary" id="form-submit" type="submit"></button>
                <p class="form-note" id="form-note"></p>
                <p class="form-feedback" id="form-feedback" role="status" aria-live="polite"></p>
              </div>
            </form>

            <aside class="contact-links-panel">
              <div class="contact-links" id="contact-links"></div>
            </aside>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p id="footer-line"></p>
        <p id="footer-credit"></p>
      </footer>
    </div>

    <script src="./site-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
