<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title id="page-title">Anna Starostina</title>
    <meta
      id="page-description"
      name="description"
      content="Anna Starostina: operations, wellness, recovery, hospitality concept development and leadership."
    />
    <meta name="theme-color" content="#ede7dc" />
    <meta id="og-title" property="og:title" content="Anna Starostina" />
    <meta
      id="og-description"
      property="og:description"
      content="Personal profile in wellness, recovery and hospitality leadership."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-nav">
        <a class="brand" href="#top">Anna Starostina</a>
        <div class="nav-controls">
          <nav>
            <a id="nav-story" href="#story">About</a>
            <a id="nav-focus" href="#focus">Focus</a>
            <a id="nav-contact" href="#contact">Contact</a>
          </nav>
          <div class="lang-switcher" aria-label="Language switcher">
            <button class="lang-button" id="lang-en" type="button">EN</button>
            <button class="lang-button" id="lang-ru" type="button">RU</button>
          </div>
        </div>
      </header>

      <main id="top">
        <section class="hero reveal">
          <div class="hero-copy">
            <p class="eyebrow" id="eyebrow"></p>
            <h1 id="headline"></h1>
            <p class="hero-summary" id="summary"></p>
            <div class="hero-actions">
              <a class="button button-primary" id="primary-cta" href="#contact"></a>
              <a class="button button-secondary" id="secondary-cta" href="#story"></a>
            </div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="visual-orb visual-orb-coral"></div>
            <div class="visual-orb visual-orb-olive"></div>
            <div class="portrait-shell">
              <div class="portrait-frame" id="portrait-frame">
                <img
                  class="portrait-image"
                  id="portrait-image"
                  alt=""
                />
                <div class="portrait-monogram" id="portrait-monogram">AS</div>
              </div>
              <div class="visual-panel">
                <span class="visual-kicker" id="visual-kicker">Wellness leadership</span>
                <span class="visual-name" id="visual-name">Montenegro</span>
                <span class="visual-line"></span>
                <span class="visual-caption" id="visual-caption">Recovery, operations, financial control and guest experience.</span>
              </div>
            </div>
          </div>
        </section>

        <section class="story reveal" id="story">
          <div class="section-heading">
            <p class="section-label" id="story-label">About</p>
            <h2 id="story-title"></h2>
          </div>
          <div class="story-layout">
            <div class="story-text" id="story-body"></div>
            <div class="story-metrics" id="metrics"></div>
          </div>
        </section>

        <section class="focus reveal" id="focus">
          <div class="section-heading">
            <p class="section-label" id="focus-label">Focus</p>
            <h2 id="focus-title"></h2>
            <p class="section-intro" id="focus-intro"></p>
          </div>
          <div class="focus-grid" id="focus-grid"></div>
        </section>

        <section class="notes reveal" id="notes">
          <div class="section-heading">
            <p class="section-label" id="notes-label">Profile details</p>
            <h2 id="notes-title"></h2>
          </div>
          <div class="notes-copy" id="notes-body"></div>
        </section>

        <section class="contact reveal" id="contact">
          <div class="contact-card">
            <p class="section-label" id="contact-label">Contact</p>
            <h2 id="contact-title"></h2>
            <p class="contact-copy" id="contact-copy"></p>
            <div class="contact-links" id="contact-links"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span id="footer-line"></span>
        <span id="footer-year"></span>
      </footer>
    </div>

    <script src="./site-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
